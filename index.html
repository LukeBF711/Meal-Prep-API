<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Tales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <!-- navigation/header -->
    <nav>
        <div class="logo">Foodie Tales</div>
        <div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Recipes</a></li>
            </ul>
        </div>
    </nav>
    <!-- hero/search -->
     <section class="hero-main flex">
        <div class="hero-inner" flex>
            <h1>Let's Get <span class="txt-highlight">Cooking</span></h1>
            <p>Search for your favorite meals</p>
            <form>
                <input class="form-control" placeholder="Search"/>
                <button class="btn btn-outline-success custom-btn" type="submit">Find Meals</button>
            </form>
        </div>
     </section>
    <script src="./assets/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
